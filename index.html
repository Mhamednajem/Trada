<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب ويب - اتصال فوري ومضمون</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #efeae2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #075e54;
            color: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            background-color: #128c7e;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border: 3px solid #25d366;
        }
        h2 { margin: 0 0 5px 0; font-size: 22px; }
        .sub-title { font-size: 12px; color: #d1f4cc; margin-bottom: 25px; }
        .status {
            background-color: #128c7e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.4;
        }
        .btn-end {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ea0038;
            color: white;
            box-shadow: 0 4px 10px rgba(234, 0, 56, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar">📞</div>
    <h2>اتصال مباشر</h2>
    <div class="sub-title">تجاوز جدران حماية الشبكة والنت الضعيف</div>
    
    <div class="status" id="status">جاري فحص اتصالك...</div>
    
    <audio id="remoteAudio" autoplay playsinline></audio>

    <button class="btn-end" onclick="endCall()">إنهاء الخط ✖</button>
</div>

<script>
    // معرفات ثابتة وفريدة للغرف
    const ROOM_A = "iraq_whatsapp_voice_A";
    const ROOM_B = "iraq_whatsapp_voice_B";

    const mediaConstraints = {
        audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
        },
        video: false
    };

    // استخدام سيرفرات متطورة (STUN + TURN) لتخطي حظر الشبكات وتمرير الصوت مجاناً
    const peerConfig = {
        config: { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                // سيرفرات TURN مجانية ومفتوحة لتمرير الصوت في حال فشل الاتصال المباشر
                {
                    urls: "turn:relay.metered.ca:80",
                    username: "metered",
                    credential: "meteredpassword"
                },
                {
                    urls: "turn:relay.metered.ca:443",
                    username: "metered",
                    credential: "meteredpassword"
                }
            ] 
        }
    };

    let localStream = null;
    let peer = null;
    let currentCall = null;

    async function init() {
        // التحقق من بروتوكول الأمن الحامي للمايكروفون
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('status').style.backgroundColor = '#ea0038';
            document.getElementById('status').innerText = "❌ خطأ: المتصفح يمنع المايك لأن الرابط ليس HTTPS آمن.";
            return;
        }

        try {
            document.getElementById('status').innerText = "يرجى إعطاء صلاحية المايكروفون...";
            localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
            document.getElementById('status').innerText = "تم تفعيل المايك ✅ جاري ربط السيرفر...";

            const urlParams = new URLSearchParams(window.location.search);
            const isPeer = urlParams.has('peer');
            
            const myID = isPeer ? ROOM_B : ROOM_A;
            const targetID = isPeer ? ROOM_A : ROOM_B;

            // إنشاء الاتصال مع السيرفر المتطور
            peer = new Peer(myID, peerConfig);

            peer.on('open', () => {
                document.getElementById('status').innerText = "أنت نشط الآن 🟢 بانتظار الطرف الآخر...";
                
                // الطرف الثاني يتصل بالطرف الأول تلقائياً
                if (isPeer) {
                    setTimeout(() => { connectToTarget(targetID); }, 1500);
                }
            });

            // استقبال الاتصال تلقائياً للطرف الأول
            peer.on('call', (call) => {
                currentCall = call;
                call.answer(localStream);
                
                call.on('stream', (remoteStream) => {
                    handleRemoteStream(remoteStream);
                });
            });

            peer.on('error', (err) => {
                console.error("Peer Error:", err);
                if(err.type === 'peer-unavailable') {
                    document.getElementById('status').innerText = "بانتظار دخول الشخص الأول للخط... 🔄";
                    // إعادة المحاولة تلقائياً كل 3 ثوانٍ لحين دخول الطرف الآخر
                    setTimeout(() => { if(isPeer) connectToTarget(targetID); }, 3000);
                }
            });

        } catch (err) {
            document.getElementById('status').style.backgroundColor = '#ea0038';
            document.getElementById('status').innerText = "❌ يرجى السماح للموقع باستخدام المايكروفون!";
        }
    }

    function connectToTarget(targetID) {
        document.getElementById('status').innerText = "جاري فتح قناة الصوت وتخطي الحماية...";
        currentCall = peer.call(targetID, localStream);
        
        currentCall.on('stream', (remoteStream) => {
            handleRemoteStream(remoteStream);
        });
    }

    function handleRemoteStream(remoteStream) {
        const audioControl = document.getElementById('remoteAudio');
        audioControl.srcObject = remoteStream;
        
        // حل مشكلة متصفحات أبل وسفاري (إجبار الصوت على التشغيل التلقائي)
        audioControl.play().catch(e => console.log("Audio play triggered manually"));
        
        document.getElementById('status').innerText = "متصل الآن ومضبوط (تحدث بحرية) 🗣️✨";
    }

    function endCall() {
        document.getElementById('status').innerText = "تم إنهاء المكالمة وفصل الخط 🔴";
        if (currentCall) currentCall.close();
        if (peer) peer.destroy();
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
    }

    window.onload = init;
</script>

</body>
</html>
