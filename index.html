<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب ويب - اتصال مباشر ثابت</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #efeae2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #075e54;
            color: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            background-color: #128c7e;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border: 3px solid #25d366;
        }
        h2 { margin: 0 0 5px 0; font-size: 22px; }
        .sub-title { font-size: 12px; color: #d1f4cc; margin-bottom: 25px; }
        .status {
            background-color: #128c7e;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.4;
        }
        .btn-end {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ea0038;
            color: white;
            box-shadow: 0 4px 10px rgba(234, 0, 56, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar">📞</div>
    <h2>اتصال مباشر</h2>
    <div class="sub-title">تحسين جودة الأداء والنت الضعيف</div>
    
    <div class="status" id="status">جاري فحص اتصالك...</div>
    
    <audio id="remoteAudio" autoplay></audio>

    <button class="btn-end" onclick="endCall()">إنهاء الخط ✖</button>
</div>

<script>
    // تغيير أسماء الغرف لضمان عدم تداخلها مع مستخدمين آخرين بالسيرفر المجاني
    const ROOM_A = "iraq_voice_room_123_A";
    const ROOM_B = "iraq_voice_room_123_B";

    const mediaConstraints = {
        audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true // موازنة الصوت التلقائية
        },
        video: false
    };

    let localStream = null;
    let peer = null;
    let currentCall = null;

    async function init() {
        // فحص الأمان (إذا الرابط ليس HTTPS على الموبايل لن يشتغل)
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('status').style.backgroundColor = '#ea0038';
            document.getElementById('status').innerText = "❌ خطأ أمني: المتصفح يرفض تشغيل المايك لأن الرابط ليس HTTPS آمن.";
            return;
        }

        try {
            document.getElementById('status').innerText = "يرجى إعطاء صلاحية (سماح للمايكروفون)...";
            localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
            document.getElementById('status').innerText = "تم السماح للمايك ✅ جاري الاتصال...";

            const urlParams = new URLSearchParams(window.location.search);
            const isPeer = urlParams.has('peer');
            
            const myID = isPeer ? ROOM_B : ROOM_A;
            const targetID = isPeer ? ROOM_A : ROOM_B;

            peer = new Peer(myID, {
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                document.getElementById('status').innerText = "أنت نشط الآن 🟢 بانتظار الطرف الآخر يدخل...";
                
                // الطرف الثاني يتصل تلقائياً بالطرف الأول
                if (isPeer) {
                    setTimeout(() => { connectToTarget(targetID); }, 1000); // تأخير ثانية لضمان استقرار السيرفر
                }
            });

            // استقبال الاتصال التلقائي (للشخص الأول)
            peer.on('call', (call) => {
                currentCall = call;
                call.answer(localStream);
                
                call.on('stream', (remoteStream) => {
                    attachSink(remoteStream);
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'peer-unavailable') {
                    document.getElementById('status').innerText = "بانتظار دخول الشخص الأول للخط... 🔄";
                    // إعادة محاولة الاتصال تلقائياً بعد 3 ثواني إذا لم يجد الشخص الأول
                    setTimeout(() => { if(isPeer) connectToTarget(targetID); }, 3000);
                }
            });

        } catch (err) {
            document.getElementById('status').style.backgroundColor = '#ea0038';
            document.getElementById('status').innerText = "❌ تم رفض المايك! يرجى السماح للموقع باستخدام المايكروفون.";
        }
    }

    function connectToTarget(targetID) {
        document.getElementById('status').innerText = "جاري الاتصال المباشر بالطرف الآخر...";
        currentCall = peer.call(targetID, localStream);
        
        currentCall.on('stream', (remoteStream) => {
            attachSink(remoteStream);
        });
    }

    function attachSink(remoteStream) {
        const audioTrack = remoteStream.getAudioTracks()[0];
        // إجبار المتصفح على استخدام نت ضعيف جداً وبجودة ممتازة
        if(audioTrack && audioTrack.getConstraints) {
            audioTrack.applyConstraints({sampleRate: 16000});
        }
        document.getElementById('remoteAudio').srcObject = remoteStream;
        document.getElementById('status').innerText = "متصل الآن (تحدث بحرية) 🗣️✨";
    }

    function endCall() {
        document.getElementById('status').innerText = "تم قطع الاتصال غلق المايك 🔴";
        if (currentCall) currentCall.close();
        if (peer) peer.destroy();
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
    }

    window.onload = init;
</script>

</body>
</html>
